<script>
    $(document).ready(function() {
    $('#showOutput').click(function() {
        $('#loadingSpinner').show();
        $('#part').hide()
        $('#diseases').hide()
        $('#showOutput').fadeOut(1000);
        $.ajax({
            url: '/get_result',
            type: 'GET',
            success: function(response) {
                var data = response;
                $('#loadingSpinner').hide();
                $('#name').fadeTo(500,0.4);
                $('#name').fadeTo(500,1);
                $('#name').html('<h1 class="display-5 mb-5">'  + data.title + '</h1');
                $('#details').html('<p class="fs-5 fw-bold text-primary">'+ "Urbanization" + ":" + data.Urbanization + '<br>' + "Population Density"+ ":" + data.Population_Density + '<br>' +"Poverty"+ ":" + data.Poverty + '<br>' + "Agricultural Productivity"+ ":" + data.Agricultural_Productivity + '<br>' + "Deforestation"+ ":" + data.Deforestation + '<br>' + "Land Degradation"+ ":" + data.Land_Degradation + '<br>' + "Disaster Risk"+ ":" + data.Disaster_Risk +'</p');

                // ---------- POLICY SUGGESTIONS ----------
    if (data.policies) {
        $('#policyList').empty();
        data.policies.forEach(function(policy) {
            $('#policyList').append('<li>' + policy + '</li>');
        });
        $('#policyBox').fadeIn(500);
    } else {
        $('#policyBox').hide();
    }
                $('#downloadPdf').fadeIn(800);

            },
            error: function(error) {
                console.error(error);
            }
        });
    });
});
</script>
